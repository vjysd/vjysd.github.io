name: Sync Resume from Overleaf

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-resume:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone Overleaf repository
        env:
          OVERLEAF_GIT_URL: ${{ secrets.OVERLEAF_GIT_URL }}
        run: |
          git clone "$OVERLEAF_GIT_URL" overleaf-resume

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv_vijay.tex 
          working_directory: overleaf-resume

      - name: Copy PDF to resume folder
        run: |
          mkdir -p resume
          cp overleaf-resume/cv_vijay.pdf resume/Sadashivaiah_Resume.pdf

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet resume/Sadashivaiah_Resume.pdf || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resume/Sadashivaiah_Resume.pdf
          git commit -m "Update resume from Overleaf [skip ci]"
          git push
