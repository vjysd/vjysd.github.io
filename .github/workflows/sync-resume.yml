name: Sync Resume from Overleaf

on:
  schedule:
    # Run every day at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  sync-resume:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone Overleaf repository
        env:
          OVERLEAF_GIT_URL: ${{ secrets.OVERLEAF_GIT_URL }}
        run: |
          # Clone the repo into the overleaf-resume directory
          git clone $OVERLEAF_GIT_URL overleaf-resume

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          # Change this to the actual name of your .tex file in Overleaf
          root_file: main_file_name.tex 
          working_directory: overleaf-resume

      - name: Copy PDF to resume folder
        run: |
          mkdir -p resume
          # Change main_file_name.pdf to match whatever your .tex file was named
          cp overleaf-resume/main_file_name.pdf resume/Sadashivaiah_Resume.pdf

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet resume/Sadashivaiah_Resume.pdf || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resume/Sadashivaiah_Resume.pdf
          git commit -m "Update resume from Overleaf [skip ci]"
          git push
